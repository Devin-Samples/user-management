# Example: Managing multiple GitHub organizations
# Create separate config files for each GitHub org, each specifying its own token

# ============================================================================
# Config for Acme Corp (config-acme.yaml)
# ============================================================================
github_org: "acme-corp"
github_token_env_var: "GITHUB_TOKEN_ACME"

team_mappings:
  - github_team_slug: "payments"
    devin_org_id: "org-acme-payments"
    sync_members: true
    sync_repos: true
  - github_team_slug: "frontend"
    devin_org_id: "org-acme-frontend"
    sync_members: true
    sync_repos: true

# ============================================================================
# Config for Contoso Ltd (config-contoso.yaml)
# ============================================================================
